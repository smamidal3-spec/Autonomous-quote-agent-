  <line x1="230" y1="130" x2="280" y2="120" class="arrow"/>
  <line x1="470" y1="120" x2="520" y2="120" class="arrow"/>
  <line x1="710" y1="120" x2="760" y2="120" class="arrow"/>
  <line x1="855" y1="170" x2="855" y2="250" class="arrow"/>
